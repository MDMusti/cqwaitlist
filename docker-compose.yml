# Local development infrastructure for CleanQueue Phase 1+
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: cleanqueue-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cleanqueue
      POSTGRES_PASSWORD: cleanqueue
      POSTGRES_DB: cleanqueue
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleanqueue -d cleanqueue"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cleanqueue-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
